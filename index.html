<!DOCTYPE html>
<html>
<head>
    <title>Secure IP-Based Canvas</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        #cooldown-box { font-size: 2em; font-weight: bold; margin: 10px; height: 1.2em; transition: color 0.3s; }
        #stats { color: #888; margin-bottom: 20px; }
        #canvas-container { position: relative; display: inline-block; background: white; border: 5px solid #333; }
        canvas { image-rendering: pixelated; display: block; cursor: crosshair; }
        #tooltip {
            position: absolute; background: rgba(0,0,0,0.9); color: white;
            padding: 5px 10px; border-radius: 4px; pointer-events: none; display: none;
        }
        input[type="color"] { width: 60px; height: 30px; border: none; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="cooldown-box">CONNECTING...</div>
    <div id="stats">Total: <span id="total">0</span> | Online: <span id="online">0</span></div>
    
    <input type="color" id="colorPicker" value="#3498db">

    <div id="canvas-container">
        <canvas id="pixelCanvas" width="600" height="600"></canvas>
        <div id="tooltip"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('cooldown-box');
        const totalEl = document.getElementById('total');
        const onlineEl = document.getElementById('online');
        const tooltip = document.getElementById('tooltip');
        
        const SIZE = 100;
        const PIXEL_SIZE = canvas.width / SIZE;
        let countData = [];
        let timerInterval;

        function startUICountdown(ms) {
            clearInterval(timerInterval);
            let remaining = ms;
            
            const updateUI = () => {
                if (remaining <= 0) {
                    timerEl.innerText = "READY";
                    timerEl.style.color = "#00ff88";
                    clearInterval(timerInterval);
                } else {
                    timerEl.innerText = `${Math.ceil(remaining / 1000)}s`;
                    timerEl.style.color = "#ff4444";
                    remaining -= 100;
                }
            };
            updateUI();
            timerInterval = setInterval(updateUI, 100);
        }

        socket.on('init', ({ grid, counts, totalChanges, cooldownRemaining }) => {
            countData = counts;
            totalEl.innerText = totalChanges;
            grid.forEach((color, i) => {
                const x = (i % SIZE) * PIXEL_SIZE;
                const y = Math.floor(i / SIZE) * PIXEL_SIZE;
                ctx.fillStyle = color;
                ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
            });
            startUICountdown(cooldownRemaining);
        });

        socket.on('update', ({ index, color, count, totalChanges }) => {
            countData[index] = count;
            totalEl.innerText = totalChanges;
            const x = (index % SIZE) * PIXEL_SIZE;
            const y = Math.floor(index / SIZE) * PIXEL_SIZE;
            ctx.fillStyle = color;
            ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
        });

        socket.on('startTimer', (ms) => startUICountdown(ms));
        socket.on('userCount', (n) => onlineEl.innerText = n);

        canvas.addEventListener('click', (e) => {
            if (timerEl.innerText !== "READY") return;
            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (rect.width / SIZE));
            const row = Math.floor((e.clientY - rect.top) / (rect.height / SIZE));
            socket.emit('changeSquare', { index: row * SIZE + col, color: document.getElementById('colorPicker').value });
        });

        // Tooltip logic
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (rect.width / SIZE));
            const row = Math.floor((e.clientY - rect.top) / (rect.height / SIZE));
            const index = row * SIZE + col;

            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
            tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
            tooltip.innerText = `Changes: ${countData[index] || 0}`;
        });
        canvas.addEventListener('mouseleave', () => tooltip.style.display = 'none');
    </script>
</body>
</html>
