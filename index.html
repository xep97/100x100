<!DOCTYPE html>
<html>
<head>
    <title>Socket Canvas</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #stats { margin: 20px; font-weight: bold; }
        #grid { 
            display: grid; 
            grid-template-columns: repeat(100, 10px); 
            grid-template-rows: repeat(100, 10px); 
            gap: 0; 
            width: 1000px; 
            margin: 0 auto; 
            border: 1px solid #ccc;
        }
        .cell { width: 10px; height: 10px; border: 0.1px solid #eee; }
        .cell:hover { border: 1px solid black; cursor: crosshair; }
    </style>
</head>
<body>
    <h1>Global Collaborative Canvas</h1>
    <div id="stats">
        Total Changes: <span id="total">0</span> | 
        Online: <span id="online">0</span>
    </div>
    <input type="color" id="colorPicker" value="#000000">
    <div id="grid"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const gridElement = document.getElementById('grid');
        const totalEl = document.getElementById('total');
        const onlineEl = document.getElementById('online');
        const colorPicker = document.getElementById('colorPicker');

        // Initialize the grid cells
        for (let i = 0; i < 10000; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            cell.onclick = () => socket.emit('changeSquare', { index: i, color: colorPicker.value });
            gridElement.appendChild(cell);
        }

        socket.on('init', ({ grid, counts, totalChanges }) => {
            totalEl.innerText = totalChanges;
            grid.forEach((color, i) => {
                const cell = document.getElementById(`cell-${i}`);
                cell.style.backgroundColor = color;
                cell.title = `Changes: ${counts[i]}`;
            });
        });

        socket.on('update', ({ index, color, count, totalChanges }) => {
            const cell = document.getElementById(`cell-${index}`);
            cell.style.backgroundColor = color;
            cell.title = `Changes: ${count}`;
            totalEl.innerText = totalChanges;
        });

        socket.on('userCount', (count) => onlineEl.innerText = count);
        socket.on('error', (msg) => alert(msg));
    </script>
</body>
</html>
